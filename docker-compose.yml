services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: task_manager
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/task_manager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 1234
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:8081
      JWT_SECRET: change-me-to-a-long-random-secret-change-me
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:

